# ============================================================
# deploy.yml - Déploiement automatique sur GitHub Pages
#
# Ce "workflow" se déclenche à chaque "push" sur la branche main.
# Il fait 2 choses :
#   1. build  : installe les dépendances et construit le site (npm run build)
#   2. deploy : publie le dossier "dist" généré sur GitHub Pages
#
# Résultat : ton site se met à jour tout seul à chaque modification poussée.
# ⚠️ Dans les réglages du dépôt > Pages, choisis la source "GitHub Actions".
# ============================================================

name: Déploiement du portfolio sur GitHub Pages

on:
  push:
    branches: [main] # se déclenche quand on pousse sur main
  workflow_dispatch: # permet aussi de lancer le déploiement à la main

# Permissions nécessaires pour publier sur Pages
permissions:
  contents: read
  pages: write
  id-token: write

# On évite deux déploiements en même temps
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ----- Étape 1 : construire le site -----
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installer les dépendances
        run: npm ci

      - name: Construire le site
        run: npm run build

      - name: Préparer l'artefact pour Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # le dossier généré par "npm run build"

  # ----- Étape 2 : déployer le site construit -----
  deploy:
    needs: build # ne s'exécute qu'après un build réussi
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publier sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
